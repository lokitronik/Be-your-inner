<header class="site-header">
  <div class="header-container">
    <div class="header-logo">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Beyourinner">
      </a>
    </div>

    <nav class="nav-desktop">
      {% if page.lang == 'en' %}
        <a href="{{ '/en/about/' | relative_url }}">ABOUT ME</a>
        <a href="{{ '/en/clarity/' | relative_url }}">CLARITY</a>
        <a href="{{ '/en/contact/' | relative_url }}">CONTACT</a>
        <a href="{{ '/' | relative_url }}">🌐 ES</a>
      {% else %}
        <a href="{{ '/sobre-mi/' | relative_url }}">SOBRE MÍ</a>
        <a href="{{ '/claridad/' | relative_url }}">CLARIDAD</a>
        <a href="{{ '/contacto/' | relative_url }}">CONTACTO</a>
        <a href="{{ '/en/' | relative_url }}">🌐 EN</a>
      {% endif %}
    </nav>

    <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>

  <nav class="nav-overlay" id="nav-overlay">
    <ul class="nav-list">
      {% if page.lang == 'en' %}
        <li><a href="{{ '/en/about/' | relative_url }}">ABOUT ME</a></li>
        <li><a href="{{ '/en/clarity/' | relative_url }}">CLARITY</a></li>
        <li><a href="{{ '/en/contact/' | relative_url }}">CONTACT</a></li>
        <li><a href="{{ '/' | relative_url }}">🌐 ES</a></li>
      {% else %}
        <li><a href="{{ '/sobre-mi/' | relative_url }}">SOBRE MÍ</a></li>
        <li><a href="{{ '/claridad/' | relative_url }}">CLARIDAD</a></li>
        <li><a href="{{ '/contacto/' | relative_url }}">CONTACTO</a></li>
        <li><a href="{{ '/en/' | relative_url }}">🌐 EN</a></li>
      {% endif %}
    </ul>
  </nav>
</header>

<style>
  /* CONFIGURACIÓN BASE */
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 5%;
    max-width: 1200px;
    margin: 0 auto;
  }

  .header-logo img { height: 45px; width: auto; }

  /* ESTILOS ESCRITORIO (PC) */
  .nav-desktop { 
    display: flex !important;
    gap: 25px; 
  }
  
  .nav-desktop a {
    text-decoration: none;
    color: #424242;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    font-weight: 500;
  }

  .menu-toggle, .nav-overlay { display: none; }

  /* ESTILOS MÓVIL (CORREGIDOS PARA PANEL LATERAL) */
  @media (max-width: 768px) {
    .nav-desktop { display: none !important; }
    
    .menu-toggle {
      display: flex;
      flex-direction: column;
      background: transparent;
      border: none;
      z-index: 1005; /* Asegura que el botón esté por encima de la caja blanca */
      cursor: pointer;
    }

    .bar {
      width: 25px;
      height: 1px;
      background-color: #B5835A;
      margin: 4px 0;
      transition: 0.4s;
    }

    /* EL CAMBIO: Panel lateral derecho en lugar de pantalla completa */
    .nav-overlay {
      display: flex;
      position: fixed;
      top: 0;
      right: -280px; /* Escondido fuera a la derecha */
      width: 280px;  /* Ancho mucho más pequeño y elegante */
      height: 100vh;
      background: white;
      box-shadow: -5px 0 15px rgba(0,0,0,0.05); /* Sombra suave para dar profundidad */
      justify-content: flex-start;
      align-items: flex-start;
      padding: 100px 40px; /* Aire arriba y a los lados */
      box-sizing: border-box;
      transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 1004;
    }

    .nav-overlay.active { 
      right: 0; /* Desliza al frente */
    }
    
    .nav-list { 
      list-style: none; 
      padding: 0; 
      text-align: left; /* Alineación a la izquierda como el ejemplo */
    }
    
    .nav-list li { margin: 25px 0; }
    
    .nav-list a { 
      font-size: 1.2rem; 
      font-family: 'Cormorant Garamond', serif; 
      text-decoration: none; 
      color: #424242;
      letter-spacing: 1px;
    }

    /* Animación del botón a X */
    .menu-toggle.active .bar:nth-child(1) { transform: rotate(-45deg) translate(-6px, 7px); }
    .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
    .menu-toggle.active .bar:nth-child(3) { transform: rotate(45deg) translate(-6px, -7px); }
  }
</style>
