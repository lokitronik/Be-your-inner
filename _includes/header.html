<style>
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 5%;
    max-width: 1200px;
    margin: 0 auto;
  }

  .header-logo img { height: 45px; width: auto; }

  /* --- ESTILOS PC (Menú horizontal clásico) --- */
  .nav-desktop { display: flex; gap: 25px; }
  .nav-desktop a {
    text-decoration: none;
    color: #424242;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    font-weight: 500;
  }
  .nav-desktop a:hover { color: #B5835A; }
  .menu-toggle { display: none; } 
  .nav-overlay { display: none; } 

  /* --- ESTILOS MÓVIL (Menú hamburguesa corregido) --- */
  @media (max-width: 768px) {
    .nav-desktop { display: none; } 
    
    .menu-toggle {
      display: flex;
      flex-direction: column;
      background: transparent;
      border: none;
      z-index: 1005; /* Por encima de todo */
      cursor: pointer;
    }

    .bar {
      width: 25px;
      height: 1px;
      background-color: #B5835A;
      margin: 4px 0;
      transition: 0.4s;
    }

    .nav-overlay {
      display: flex;
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100vh;
      background: rgba(255, 255, 255, 0.98); /* Blanco con ligerísima transparencia */
      justify-content: center;
      align-items: center;
      transition: right 0.5s ease-in-out;
      z-index: 1004;
    }

    .nav-overlay.active { 
      right: 0; 
    }

    .nav-list { 
      list-style: none; 
      padding: 0; 
      text-align: center;
      margin-top: -50px; /* Sube un poco el menú para que no se vea tan abajo */
    }

    .nav-list li { 
      margin: 20px 0; /* Espacio moderado entre enlaces */
    }

    .nav-list a { 
      font-size: 1.4rem; /* Tamaño más elegante, no tan gigante */
      font-family: 'Cormorant Garamond', serif; 
      text-decoration: none; 
      color: #1a1a1a;
      letter-spacing: 2px;
      text-transform: lowercase; /* Mantiene tu estética minimalista */
    }

    /* Animación del botón hamburguesa a X */
    .menu-toggle.active .bar:nth-child(1) { transform: rotate(-45deg) translate(-6px, 7px); }
    .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
    .menu-toggle.active .bar:nth-child(3) { transform: rotate(45deg) translate(-6px, -7px); }
    
    /* Evita que se pueda hacer zoom out raro o scroll lateral */
    body.menu-open {
      overflow: hidden;
    }
  }
</style>
