<header class="site-header">
  <div class="header-container">
    
    <div class="header-logo">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Beyourinner">
      </a>
    </div>

    <nav class="nav-desktop">
      {% if page.lang == 'en' %}
        <a href="{{ '/en/about/' | relative_url }}">ABOUT ME</a>
        <a href="{{ '/en/clarity/' | relative_url }}">CLARITY</a>
        <a href="{{ '/en/contact/' | relative_url }}">CONTACT</a>
        <a href="{{ '/' | relative_url }}">🌐 ES</a>
      {% else %}
        <a href="{{ '/sobre-mi/' | relative_url }}">SOBRE MÍ</a>
        <a href="{{ '/claridad/' | relative_url }}">CLARIDAD</a>
        <a href="{{ '/contacto/' | relative_url }}">CONTACTO</a>
        <a href="{{ '/en/' | relative_url }}">🌐 EN</a>
      {% endif %}
    </nav>

    <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>

  <nav class="nav-overlay" id="nav-overlay">
    <ul class="nav-list">
      {% if page.lang == 'en' %}
        <li><a href="{{ '/en/about/' | relative_url }}">ABOUT ME</a></li>
        <li><a href="{{ '/en/clarity/' | relative_url }}">CLARITY</a></li>
        <li><a href="{{ '/en/contact/' | relative_url }}">CONTACT</a></li>
        <li><a href="{{ '/' | relative_url }}">🌐 ES</a></li>
      {% else %}
        <li><a href="{{ '/sobre-mi/' | relative_url }}">SOBRE MÍ</a></li>
        <li><a href="{{ '/claridad/' | relative_url }}">CLARIDAD</a></li>
        <li><a href="{{ '/contacto/' | relative_url }}">CONTACTO</a></li>
        <li><a href="{{ '/en/' | relative_url }}">🌐 EN</a></li>
      {% endif %}
    </ul>
  </nav>
</header>

<style>
  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 5%;
    max-width: 1200px;
    margin: 0 auto;
  }

  .header-logo img { height: 45px; width: auto; }

  /* --- ESTILOS PC --- */
  .nav-desktop { display: flex; gap: 25px; }
  .nav-desktop a {
    text-decoration: none;
    color: #424242;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    font-weight: 500;
  }
  .nav-desktop a:hover { color: #B5835A; }
  .menu-toggle { display: none; } /* Escondido en PC */
  .nav-overlay { display: none; } /* Escondido en PC */

  /* --- ESTILOS MÓVIL --- */
  @media (max-width: 768px) {
    .nav-desktop { display: none; } /* Escondemos el menú horizontal */
    
    .menu-toggle {
      display: flex;
      flex-direction: column;
      background: transparent;
      border: none;
      z-index: 1005;
    }

    .bar {
      width: 25px;
      height: 1px;
      background-color: #B5835A;
      margin: 4px 0;
      transition: 0.4s;
    }

    .nav-overlay {
      display: flex;
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100vh;
      background: white;
      justify-content: center;
      align-items: center;
      transition: 0.5s;
      z-index: 1004;
    }

    .nav-overlay.active { right: 0; }
    .nav-list { list-style: none; padding: 0; text-align: center; }
    .nav-list li { margin: 25px 0; }
    .nav-list a { font-size: 1.6rem; font-family: 'Cormorant Garamond', serif; text-decoration: none; color: #424242; }

    /* Animación X */
    .menu-toggle.active .bar:nth-child(1) { transform: rotate(-45deg) translate(-6px, 7px); }
    .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
    .menu-toggle.active .bar:nth-child(3) { transform: rotate(45deg) translate(-6px, -7px); }
  }
</style>
