<header>
  <div class="header-logo">
    <a href="{{ '/' | relative_url }}">
      <img src="https://lokitronik.github.io/Be-your-inner/assets/images/logo.png" alt="Be Your Inner">
    </a>
  </div>
  
  <nav>
    {% if page.lang == 'en' %}
      <a href="{{ '/en/about/' | relative_url }}">ABOUT ME</a> |
      <a href="{{ '/en/clarity/' | relative_url }}">CLARITY</a> |
      <a href="{{ '/en/contact/' | relative_url }}">CONTACT</a>
    {% else %}
      <a href="{{ '/sobre-mi/' | relative_url }}">SOBRE MÍ</a> |
      <a href="{{ '/claridad/' | relative_url }}">CLARIDAD</a> |
      <a href="{{ '/contacto/' | relative_url }}">CONTACTO</a>
    {% endif %}
    
    <span class="lang-selector">
      | 🌐 
      {% if page.lang == 'en' %}
        <a href="{{ '/' | relative_url }}">ES</a>
      {% else %}
        <a href="{{ '/en/' | relative_url }}">EN</a>
      {% endif %}
    </span>
  </nav>
</header>
