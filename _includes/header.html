<header>
  <div class="header-logo">
    <a href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Be Your Inner" style="height: 60px;">
    </a>
  </div>
  
  <nav>
    {% if page.lang == 'en' %}
      <a href="{{ '/en/about/' | relative_url }}">About Me</a>
      <a href="{{ '/en/clarity/' | relative_url }}">Clarity</a>
      <a href="{{ '/en/contact/' | relative_url }}">Contact</a>
    {% else %}
      <a href="{{ '/sobre-mi/' | relative_url }}">Sobre Mí</a>
      <a href="{{ '/claridad/' | relative_url }}">Claridad</a>
      <a href="{{ '/contacto/' | relative_url }}">Contacto</a>
    {% endif %}
    
    <div class="lang-selector">
      🌐 
      {% if page.lang == 'en' %}
        <a href="{{ '/' | relative_url }}">ES</a> | <strong>EN</strong>
      {% else %}
        <strong>ES</strong> | <a href="{{ '/en/' | relative_url }}">EN</a>
      {% endif %}
    </div>
  </nav>
</header>
